title: Watchful_IP
author: Watchful IP
email: Watchfulip@protonmail.com
description: > # this means to ignore newlines until "show_exerpts:"
        Security researching in the middle of the night.<br>
        Focusing on ARM based embedded IoT
show_excerpts: false # set to true to show excerpts on the homepage

kramdown:
  input: GFM

paginate: 4
paginate_path: "/blog/page:num/"

tag_permalink_style: pretty
tag_page_layout: tag_page
tag_page_dir: tag

# jekyll-dash date format
# refer to http://shopify.github.io/liquid/filters/date/ if you want to customize this
dash:
  date_format: "%b %-d, %Y"

  # generate social links in footer
  # supported colors: green, red, orange, blue, cyan, pink, teal, yellow, indigo, purple
  social_links:
    - url: https://twitter.com/watchfulip
      icon: twitter-square
      color: cyan
    - url: Watchfulip@protonmail.com
      icon: email-square
      color: red
    - url: https://github.com/watchfulip
      icon: github-square
      color: purple

  show_author: true

# Build settings
theme: jekyll-dash

plugins:
 - jekyll-feed
 - jekyll-seo-tag
 - jekyll-paginate
 - liquid-md5
# - jekyll/tagging

# Replaces the default avatar provider (gravatar)
#avatar_source: github
github_username: watchfulip
